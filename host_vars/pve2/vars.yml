---
# pve2 (192.168.1.11) - Proxmox node 2
# RTX 2080 Ti GPU passthrough to VM 109 (k8cluster2)

pve_gpu_passthrough: true
pve_iommu_type: "amd"
pve_vfio_pci_ids: "10de:1e07,10de:10f7,10de:1ad6,10de:1ad7"
pve_vfio_modules:
  - vfio
  - vfio_iommu_type1
  - vfio_pci
pve_gpu_blacklist:
  - nouveau
  - nvidia
  - nvidiafb

# Network configuration
pve_mgmt_iface_manual: true
pve_mgmt_interface: "enp5s0"
pve_mgmt_address: "192.168.1.11/24"
pve_mgmt_gateway: "192.168.1.1"
pve_storage_interface: "enp3s0"
pve_storage_mtu: 9000
pve_vmbr1_addresses:
  - "10.10.11.1/24"
  - "10.10.12.1/24"
pve_static_routes:
  - "10.10.10.0/24 via 10.10.11.2 dev vmbr1"
pve_wireless_interface: "wlp5s0"
pve_extra_source: true
