---
# Unattended upgrades — block kubectl (managed via k8s upgrade cycle)
# 1password-cli is intentionally NOT blacklisted — let it auto-update
unattended_upgrades_blacklist:
  - kubectl
  - kubernetes-cni

# Systemd service monitoring
node_exporter_systemd_enabled: true
node_exporter_systemd_units:
  - docker.service
