haproxy_cfg_path: /etc/haproxy/haproxy.cfg

k8s_control_plane_nodes:
  - { name: k8cluster1, ip: 192.168.1.90 }
  - { name: k8cluster2, ip: 192.168.1.89 }
  - { name: k8cluster3, ip: 192.168.1.91 }

vip_interface: eth0

# Unattended upgrades — block load balancer packages (managed deployment)
unattended_upgrades_blacklist:
  - haproxy
  - keepalived

# Systemd service monitoring
node_exporter_systemd_enabled: true
node_exporter_systemd_units:
  - haproxy.service
  - keepalived.service
