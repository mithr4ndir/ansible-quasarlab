---
- name: Configure GRUB for IOMMU
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="{{ pve_grub_cmdline }}"'
  notify: Update GRUB

- name: Configure VFIO PCI IDs
  ansible.builtin.template:
    src: vfio.conf.j2
    dest: /etc/modprobe.d/vfio.conf
    owner: root
    group: root
    mode: '0644'
  notify: Update initramfs

- name: Blacklist GPU drivers
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-gpu.conf
    content: |
      {% for driver in pve_gpu_blacklist %}
      blacklist {{ driver }}
      {% endfor %}
    owner: root
    group: root
    mode: '0644'
  notify: Update initramfs

- name: Load VFIO kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ pve_vfio_modules }}"

- name: Check if nvidia-cdi-refresh service exists
  ansible.builtin.command: systemctl list-unit-files nvidia-cdi-refresh.service
  register: nvidia_cdi_refresh_check
  changed_when: false
  failed_when: false

- name: Disable nvidia-cdi-refresh (GPU passed through to VM)
  ansible.builtin.systemd:
    name: nvidia-cdi-refresh
    state: stopped
    enabled: false
    masked: true
  when: "'nvidia-cdi-refresh' in nvidia_cdi_refresh_check.stdout"
