---
- name: Configure APT - no-subscription repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: |
      deb http://ftp.us.debian.org/debian bookworm main contrib

      deb http://ftp.us.debian.org/debian bookworm-updates main contrib

      # security updates
      deb http://security.debian.org bookworm-security main contrib

      deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
    owner: root
    group: root
    mode: '0644'
  when: pve_apt_no_subscription

- name: Disable enterprise repo if present
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^deb https://enterprise.proxmox.com'
    line: '# deb https://enterprise.proxmox.com/debian/pve bookworm pve-enterprise'
  failed_when: false

- name: Configure Ceph repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.list
    content: |
      deb http://download.proxmox.com/debian/{{ pve_apt_ceph_repo }} bookworm no-subscription
    owner: root
    group: root
    mode: '0644'

- name: Configure Elastic repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/artifacts_elastic_co_packages_8_x_apt.list
    content: |
      deb https://artifacts.elastic.co/packages/8.x/apt stable main
    owner: root
    group: root
    mode: '0644'

- name: Load kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ pve_kernel_modules }}"

- name: Persist kernel modules
  ansible.builtin.template:
    src: modules.j2
    dest: /etc/modules
    owner: root
    group: root
    mode: '0644'

- name: Install iSCSI and multipath packages
  ansible.builtin.apt:
    name:
      - open-iscsi
      - multipath-tools
    state: present
    update_cache: true

- name: Configure iSCSI initiator
  ansible.builtin.template:
    src: iscsid.conf.j2
    dest: /etc/iscsi/iscsid.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart iSCSI

- name: Enable iSCSI and multipath services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ pve_iscsi_services }}"
