---
# GPU failover + monitor are only deployed when there are GPU passthrough VMs
# (pve_gpu_vms is non-empty). With none, the role tears the machinery down.
- name: Determine whether any GPU passthrough VMs are configured
  ansible.builtin.set_fact:
    pve_gpu_enabled: "{{ (pve_gpu_vms | length) > 0 }}"

# --- Deploy path (only when GPU passthrough VMs exist) ---
- name: Create snippets directory
  ansible.builtin.file:
    path: "{{ pve_snippets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: pve_gpu_enabled

- name: Deploy GPU failover hookscript
  ansible.builtin.template:
    src: gpu-failover.sh.j2
    dest: "{{ pve_snippets_dir }}/gpu-failover.sh"
    owner: root
    group: root
    mode: "0755"
  when: pve_gpu_enabled

- name: Check current hookscript on GPU VMs
  ansible.builtin.command:
    cmd: "qm config {{ item.key }}"
  loop: "{{ pve_gpu_vms | dict2items }}"
  register: vm_configs
  changed_when: false
  # Suppress only the "VM lives on a different node" case so migration
  # is tolerated; real errors (permissions, broken binaries, etc.) still
  # fail the play. default() wrappers are required because a stricter
  # `rc != 0 and ...` form intermittently surfaced 'rc is undefined'
  # errors inside the loop context (see 2026-04-14 ansible run where
  # proxmox.yml failed on pve2 for item.key=115).
  failed_when: >-
    (rc | default(0)) != 0
    and 'does not exist' not in (stderr | default(''))
  when:
    - pve_gpu_enabled
    - inventory_hostname == 'pve2'

- name: Attach hookscript to GPU VMs
  ansible.builtin.command:
    cmd: "qm set {{ item.item.key }} -hookscript local:snippets/gpu-failover.sh"
  loop: "{{ vm_configs.results | default([]) }}"
  when:
    - pve_gpu_enabled
    - inventory_hostname == 'pve2'
    - item.rc is defined and item.rc == 0
    - item.stdout is defined
    - "'hookscript: local:snippets/gpu-failover.sh' not in item.stdout"
  changed_when: true

- name: Deploy GPU VM monitor script
  ansible.builtin.template:
    src: gpu-vm-monitor.sh.j2
    dest: /usr/local/bin/gpu-vm-monitor.sh
    owner: root
    group: root
    mode: "0755"
  when: pve_gpu_enabled

- name: Deploy GPU VM monitor systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | replace('.j2', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - gpu-vm-monitor.service.j2
    - gpu-vm-monitor.timer.j2
  notify: Reload systemd
  when: pve_gpu_enabled

- name: Enable GPU VM monitor timer
  ansible.builtin.systemd:
    name: gpu-vm-monitor.timer
    enabled: true
    state: started
    daemon_reload: true
  when: pve_gpu_enabled

# --- Teardown path (when no GPU passthrough VMs are configured) ---
# Removes the gpu-vm-monitor that performed PCI-reset recovery. Its in-VM
# health check also had a bug (grep matched nvidia-smi's own error string),
# so leaving it running was worse than useless.
- name: Decommission GPU VM monitor timer/service
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - gpu-vm-monitor.timer
    - gpu-vm-monitor.service
  failed_when: false
  when: not pve_gpu_enabled

- name: Remove obsolete GPU monitor + failover files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/gpu-vm-monitor.timer
    - /etc/systemd/system/gpu-vm-monitor.service
    - /usr/local/bin/gpu-vm-monitor.sh
    - "{{ pve_snippets_dir }}/gpu-failover.sh"
    - /var/lib/node_exporter/textfiles/gpu_vm_monitor.prom
  notify: Reload systemd
  when: not pve_gpu_enabled
