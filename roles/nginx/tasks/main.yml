- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Configure Nginx for FleetDM
  template:
    src: fleetdm.nginx.j2
    dest: /etc/nginx/sites-available/fleetdm

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/fleetdm
    dest: /etc/nginx/sites-enabled/fleetdm
    state: link

- name: Restart Nginx
  systemd:
    name: nginx
    state: restarted