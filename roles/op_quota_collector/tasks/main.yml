---
# Install the Python parser helper in a stable path. Parser has zero
# non-stdlib deps so no venv is needed.
- name: Ensure parser install directory exists
  ansible.builtin.file:
    path: /usr/local/lib/op-quota-collector
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install parse.py helper
  ansible.builtin.copy:
    src: parse.py
    dest: "{{ op_quota_parser }}"
    owner: root
    group: root
    mode: '0755'
  notify:
    - restart-op-quota-collector

- name: Install collector script
  ansible.builtin.template:
    src: op-quota-collector.sh.j2
    dest: /usr/local/bin/op-quota-collector.sh
    owner: root
    group: root
    mode: '0755'
  notify:
    - restart-op-quota-collector

- name: Install systemd service unit
  ansible.builtin.template:
    src: op-quota-collector.service.j2
    dest: /etc/systemd/system/op-quota-collector.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload-systemd
    - restart-op-quota-collector

- name: Install systemd timer unit
  ansible.builtin.template:
    src: op-quota-collector.timer.j2
    dest: /etc/systemd/system/op-quota-collector.timer
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload-systemd
    - restart-op-quota-collector

- name: Flush handlers so timer is reloaded before we enable it
  ansible.builtin.meta: flush_handlers

- name: Enable and start collector timer
  ansible.builtin.systemd:
    name: op-quota-collector.timer
    enabled: true
    state: started

# Prime run so Prometheus has data on the very next scrape. Runs as the
# collector user (not root) to match production execution context.
#
# `failed_when: false` is intentional here: the collector script always
# exits 0 by design, surfacing failure through the
# `onepassword_ratelimit_collector_success` gauge rather than a non-zero
# exit code. A non-zero exit would flap the systemd service and pollute
# `systemctl --failed`. If the first run has an issue, it shows up in
# syslog (tagged op-quota-collector) and in the Prometheus metric, not
# in Ansible's task result.
- name: Prime first collector run
  ansible.builtin.command: /usr/local/bin/op-quota-collector.sh
  become: true
  become_user: "{{ op_quota_user }}"
  changed_when: false
  failed_when: false
