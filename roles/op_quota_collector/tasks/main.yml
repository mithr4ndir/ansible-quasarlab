---
# Backward-compatibility shim. The role was renamed to
# op_ratelimit_collector on 2026-04-18 because it collects 1Password
# rate-limit quota metrics, and the new name is more accurate.
#
# This shim keeps old playbook references working for at least one
# release cycle. Remove this directory once all callers have updated.

- name: Deprecation warning for op_quota_collector role
  ansible.builtin.debug:
    msg: >-
      The 'op_quota_collector' role has been renamed to
      'op_ratelimit_collector'. Update your playbooks to use the new
      name. This alias will be removed in a future release.

- name: Delegate to op_ratelimit_collector
  ansible.builtin.include_role:
    name: op_ratelimit_collector
