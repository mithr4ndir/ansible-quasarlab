---
- name: Fail early if the NUT monitor password was not provided
  ansible.builtin.assert:
    that:
      - nut_monitor_password is defined
      - nut_monitor_password | length > 0
    fail_msg: >-
      nut_monitor_password is empty. Run via playbooks/ups-shutdown.yml, which
      sets it from the NUT_MONITOR_PASSWORD env var (export it first, e.g.
      NUT_MONITOR_PASSWORD="$(op read 'op://Infrastructure/NUT upsmon/password')").
    quiet: true

- name: Install NUT client
  ansible.builtin.apt:
    name: nut-client
    state: present
    update_cache: true

- name: Set NUT to netclient mode
  ansible.builtin.copy:
    dest: /etc/nut/nut.conf
    content: |
      # Managed by Ansible (nut_client role)
      MODE=netclient
    owner: root
    group: nut
    mode: '0640'
  notify: Restart nut-monitor

- name: Deploy upsmon.conf
  ansible.builtin.template:
    src: upsmon.conf.j2
    dest: /etc/nut/upsmon.conf
    owner: root
    group: nut
    mode: '0640'
  no_log: true  # contains the monitor password
  notify: Restart nut-monitor

- name: Deploy upssched.conf
  ansible.builtin.template:
    src: upssched.conf.j2
    dest: /etc/nut/upssched.conf
    owner: root
    group: nut
    mode: '0640'
  notify: Restart nut-monitor

- name: Deploy upssched command script
  ansible.builtin.template:
    src: upssched-cmd.j2
    dest: /etc/nut/upssched-cmd
    owner: root
    group: nut
    mode: '0750'
  notify: Restart nut-monitor

- name: Enable and start nut-monitor
  ansible.builtin.systemd:
    name: nut-monitor
    enabled: true
    state: started

# --- Proxmox HA: prevent guest relocation during a coordinated power-down ---
- name: Read current HA shutdown policy from datacenter.cfg
  # Read the policy from the cluster config file rather than parsing
  # `pvesh get /cluster/options --output-format json`, whose `ha` field
  # shape varies by Proxmox version (a JSON object on PVE 8, but can be a
  # `key=value` format-string elsewhere). datacenter.cfg always stores it
  # as `ha: shutdown_policy=<value>`, so this stays idempotent regardless.
  ansible.builtin.command: grep -oP '^ha:.*shutdown_policy=\K\w+' /etc/pve/datacenter.cfg
  register: pve_ha_policy
  run_once: true
  changed_when: false
  failed_when: false  # grep exits 1 when ha line/policy is absent; empty stdout is the signal to set it
  check_mode: false
  when: nut_set_ha_shutdown_policy | bool

- name: Set HA shutdown policy to freeze
  ansible.builtin.command: >-
    pvesh set /cluster/options --ha shutdown_policy={{ nut_ha_shutdown_policy }}
  run_once: true
  when:
    - nut_set_ha_shutdown_policy | bool
    - (pve_ha_policy.stdout | default('') | trim) != nut_ha_shutdown_policy
  changed_when: true
