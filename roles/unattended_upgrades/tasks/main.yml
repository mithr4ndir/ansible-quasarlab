---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'
  notify: Restart unattended-upgrades

- name: Configure auto-upgrades schedule
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'

- name: Enable unattended-upgrades service
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Deploy update metrics script
  ansible.builtin.template:
    src: update-metrics.sh.j2
    dest: /usr/local/bin/update-metrics.sh
    mode: '0755'

- name: Configure apt post-invoke hook for metrics
  ansible.builtin.copy:
    content: 'DPkg::Post-Invoke { "/usr/local/bin/update-metrics.sh || true"; };'
    dest: /etc/apt/apt.conf.d/99update-metrics
    mode: '0644'

- name: Deploy update-metrics systemd service unit
  ansible.builtin.template:
    src: update-metrics.service.j2
    dest: /etc/systemd/system/update-metrics.service
    mode: '0644'
  register: update_metrics_service

- name: Deploy update-metrics systemd timer unit
  ansible.builtin.template:
    src: update-metrics.timer.j2
    dest: /etc/systemd/system/update-metrics.timer
    mode: '0644'
  register: update_metrics_timer

- name: Reload systemd if unit files changed
  ansible.builtin.systemd:
    daemon_reload: true
  when: update_metrics_service.changed or update_metrics_timer.changed

- name: Enable and start update-metrics timer
  ansible.builtin.systemd:
    name: update-metrics.timer
    enabled: true
    state: started

- name: Run metrics script to seed initial data
  ansible.builtin.command: /usr/local/bin/update-metrics.sh
  changed_when: false

- name: Verify unattended-upgrades is active
  ansible.builtin.command: apt-config dump APT::Periodic::Unattended-Upgrade
  register: apt_config
  changed_when: false
  failed_when: "'1' not in apt_config.stdout"
