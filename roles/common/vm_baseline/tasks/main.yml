---
- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ vm_baseline_packages }}"
    state: present
    update_cache: true

- name: Ensure qemu-guest-agent is running
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Install chrony for consistent NTP
  ansible.builtin.apt:
    name: "{{ vm_baseline_ntp_package }}"
    state: present
  notify: Restart chrony

- name: Stop systemd-timesyncd if present (replaced by chrony)
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: false
    state: stopped
  failed_when: false

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started
    daemon_reload: true

- name: Apply sysctl tuning
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
    state: present
  loop: "{{ vm_baseline_sysctl | dict2items }}"

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC
