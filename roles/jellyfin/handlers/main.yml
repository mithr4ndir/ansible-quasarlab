---
- name: Reload NVIDIA driver
  ansible.builtin.shell:
    cmd: |
      docker compose -f {{ jellyfin_config_dir }}/docker-compose.yml down
      rmmod nvidia_uvm nvidia_drm nvidia_modeset nvidia 2>/dev/null || true
      modprobe nvidia
      docker compose -f {{ jellyfin_config_dir }}/docker-compose.yml up -d
  notify: Verify GPU

- name: Restart Docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
    daemon_reload: true

- name: Restart Jellyfin
  ansible.builtin.shell:
    cmd: docker compose up -d
    chdir: "{{ jellyfin_config_dir }}"

- name: Verify GPU
  ansible.builtin.command:
    cmd: nvidia-smi --query-gpu=name --format=csv,noheader
  register: gpu_check
  failed_when: gpu_check.rc != 0
  changed_when: false
