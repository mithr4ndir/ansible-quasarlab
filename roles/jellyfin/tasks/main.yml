---
# --- NVIDIA Driver ---
- name: Install NVIDIA driver
  ansible.builtin.apt:
    name: "nvidia-driver-{{ nvidia_driver_version }}-server"
    state: present
    update_cache: true

- name: Disable GSP firmware for PCI passthrough
  ansible.builtin.copy:
    content: "options nvidia NVreg_EnableGpuFirmware=0\n"
    dest: /etc/modprobe.d/nvidia-gsp.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload NVIDIA driver

# --- Remove Docker-based Jellyfin ---
- name: Stop and remove Docker Jellyfin container
  community.docker.docker_compose_v2:
    project_src: /opt/jellyfin/config
    state: absent
  ignore_errors: true

# --- Jellyfin Native Install ---
- name: Add Jellyfin GPG key
  ansible.builtin.get_url:
    url: https://repo.jellyfin.org/jellyfin_team.gpg.key
    dest: /etc/apt/keyrings/jellyfin.asc
    mode: "0644"

- name: Add Jellyfin apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/jellyfin.asc] https://repo.jellyfin.org/ubuntu {{ ansible_distribution_release }} main"
    filename: jellyfin
    state: present

- name: Install Jellyfin and NVIDIA libraries
  ansible.builtin.apt:
    name:
      - jellyfin
      - libnvidia-decode-{{ nvidia_driver_version }}-server
      - libnvidia-encode-{{ nvidia_driver_version }}-server
      - sqlite3
    state: present
    update_cache: true

- name: Add jellyfin user to GPU groups
  ansible.builtin.user:
    name: jellyfin
    groups: render,video
    append: true
  notify: Restart Jellyfin

# --- Migrate Docker data to native paths ---
- name: Check if Docker data exists for migration
  ansible.builtin.stat:
    path: /opt/jellyfin/config/data/jellyfin.db
  register: docker_data

- name: Stop Jellyfin before migration
  ansible.builtin.systemd:
    name: jellyfin
    state: stopped
  when: docker_data.stat.exists

- name: Migrate config files from Docker layout
  ansible.builtin.shell:
    cmd: |
      cp -a /opt/jellyfin/config/config/system.xml {{ jellyfin_config_dir }}/system.xml 2>/dev/null || true
      cp -a /opt/jellyfin/config/config/migrations.xml {{ jellyfin_config_dir }}/migrations.xml 2>/dev/null || true
      cp -a /opt/jellyfin/config/config/logging.default.json {{ jellyfin_config_dir }}/logging.default.json 2>/dev/null || true
      cp -rn /opt/jellyfin/config/config/ScheduledTasks {{ jellyfin_config_dir }}/ 2>/dev/null || true
      chown -R jellyfin:adm {{ jellyfin_config_dir }}/
    creates: "{{ jellyfin_config_dir }}/system.xml"
  when: docker_data.stat.exists

- name: Migrate data directory from Docker layout
  ansible.builtin.shell:
    cmd: |
      cp -rn /opt/jellyfin/config/data/ {{ jellyfin_data_dir }}/data/
      cp -rn /opt/jellyfin/config/metadata/ {{ jellyfin_data_dir }}/metadata/ 2>/dev/null || true
      cp -rn /opt/jellyfin/config/plugins/ {{ jellyfin_data_dir }}/plugins/ 2>/dev/null || true
      cp -rn /opt/jellyfin/config/root/ {{ jellyfin_data_dir }}/root/ 2>/dev/null || true
      chown -R jellyfin:jellyfin {{ jellyfin_data_dir }}/
    creates: "{{ jellyfin_data_dir }}/data/jellyfin.db"
  when: docker_data.stat.exists

- name: Fix paths in library database (container → native)
  ansible.builtin.shell:
    cmd: |
      sqlite3 {{ jellyfin_data_dir }}/data/library.db "UPDATE TypedBaseItems SET Path = REPLACE(Path, '/media/', '{{ jellyfin_media_mount }}/') WHERE Path LIKE '/media/%';"
      sqlite3 {{ jellyfin_data_dir }}/data/library.db "UPDATE TypedBaseItems SET Path = REPLACE(Path, '/config/root/', '{{ jellyfin_data_dir }}/root/') WHERE Path LIKE '/config/root/%';"
    creates: "{{ jellyfin_data_dir }}/.paths_migrated"
  when: docker_data.stat.exists
  register: paths_fix

- name: Mark paths as migrated
  ansible.builtin.file:
    path: "{{ jellyfin_data_dir }}/.paths_migrated"
    state: touch
    owner: jellyfin
    group: jellyfin
    mode: "0644"
  when: paths_fix.changed | default(false)

- name: Rename Docker data directory to prevent re-migration
  ansible.builtin.command:
    cmd: mv /opt/jellyfin/config /opt/jellyfin/config.migrated
    removes: /opt/jellyfin/config/data/jellyfin.db
  when: docker_data.stat.exists

# --- NFS Mount ---
- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ jellyfin_media_mount }}"
    state: directory
    mode: "0755"

- name: Add NFS mount to fstab
  ansible.posix.mount:
    src: "{{ jellyfin_nfs_server }}:{{ jellyfin_media_nfs_path }}"
    path: "{{ jellyfin_media_mount }}"
    fstype: nfs
    opts: "nfsvers=4.1,hard,timeo=600,retrans=2"
    state: mounted

# --- Jellyfin Configuration ---
- name: Template encoding.xml
  ansible.builtin.template:
    src: encoding.xml.j2
    dest: "{{ jellyfin_config_dir }}/encoding.xml"
    owner: jellyfin
    group: adm
    mode: "0644"
  notify: Restart Jellyfin

- name: Template network.xml
  ansible.builtin.template:
    src: network.xml.j2
    dest: "{{ jellyfin_config_dir }}/network.xml"
    owner: jellyfin
    group: adm
    mode: "0644"
  notify: Restart Jellyfin

- name: Ensure Jellyfin service is enabled and started
  ansible.builtin.systemd:
    name: jellyfin
    enabled: true
    state: started

# --- GPU Watchdog ---
- name: Deploy GPU watchdog script
  ansible.builtin.template:
    src: gpu-watchdog.sh.j2
    dest: /usr/local/bin/gpu-watchdog.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart GPU watchdog

- name: Deploy GPU watchdog service
  ansible.builtin.template:
    src: gpu-watchdog.service.j2
    dest: /etc/systemd/system/gpu-watchdog.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart GPU watchdog

- name: Enable GPU watchdog service
  ansible.builtin.systemd:
    name: gpu-watchdog.service
    enabled: true
    state: started
    daemon_reload: true

# --- Monitoring ---
- name: Deploy Jellyfin monitoring API key
  ansible.builtin.copy:
    content: "{{ jellyfin_monitoring_api_key }}"
    dest: "{{ jellyfin_config_dir }}/monitoring-api-key"
    owner: root
    group: root
    mode: "0600"
  when: jellyfin_monitoring_api_key | length > 0

- name: Deploy GPU metrics collector
  ansible.builtin.template:
    src: gpu-metrics.sh.j2
    dest: /usr/local/bin/gpu-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy Jellyfin metrics collector
  ansible.builtin.template:
    src: jellyfin-metrics.sh.j2
    dest: /usr/local/bin/jellyfin-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy metrics systemd services
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | replace('.j2', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - gpu-metrics.service.j2
    - gpu-metrics.timer.j2
    - jellyfin-metrics.service.j2
    - jellyfin-metrics.timer.j2
  notify: Reload systemd

- name: Enable metrics timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - gpu-metrics.timer
    - jellyfin-metrics.timer
