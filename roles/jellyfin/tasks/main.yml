---
# --- NVIDIA Driver ---
- name: Install NVIDIA driver
  ansible.builtin.apt:
    name: "nvidia-driver-{{ nvidia_driver_version }}-server"
    state: present
    update_cache: true

- name: Disable GSP firmware for PCI passthrough
  ansible.builtin.copy:
    content: "options nvidia NVreg_EnableGpuFirmware=0\n"
    dest: /etc/modprobe.d/nvidia-gsp.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload NVIDIA driver

# --- Remove Docker-based Jellyfin ---
- name: Stop and remove Docker Jellyfin container
  community.docker.docker_compose_v2:
    project_src: /opt/jellyfin/config
    state: absent
  ignore_errors: true

# --- Jellyfin Native Install ---
- name: Add Jellyfin GPG key
  ansible.builtin.get_url:
    url: https://repo.jellyfin.org/jellyfin_team.gpg.key
    dest: /etc/apt/keyrings/jellyfin.asc
    mode: "0644"

- name: Add Jellyfin apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/jellyfin.asc] https://repo.jellyfin.org/ubuntu {{ ansible_distribution_release }} main"
    filename: jellyfin
    state: present

- name: Install Jellyfin and NVIDIA libraries
  ansible.builtin.apt:
    name:
      - jellyfin
      - libnvidia-decode-{{ nvidia_driver_version }}-server
      - libnvidia-encode-{{ nvidia_driver_version }}-server
    state: present
    update_cache: true

- name: Add jellyfin user to GPU groups
  ansible.builtin.user:
    name: jellyfin
    groups: render,video
    append: true
  notify: Restart Jellyfin

# --- NFS Mount ---
- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ jellyfin_media_mount }}"
    state: directory
    mode: "0755"

- name: Add NFS mount to fstab
  ansible.posix.mount:
    src: "{{ jellyfin_nfs_server }}:{{ jellyfin_media_nfs_path }}"
    path: "{{ jellyfin_media_mount }}"
    fstype: nfs
    opts: "nfsvers=4.1,hard,timeo=600,retrans=2"
    state: mounted

# --- Jellyfin Configuration ---
- name: Template encoding.xml
  ansible.builtin.template:
    src: encoding.xml.j2
    dest: "{{ jellyfin_config_dir }}/encoding.xml"
    owner: jellyfin
    group: adm
    mode: "0644"
  notify: Restart Jellyfin

- name: Template network.xml
  ansible.builtin.template:
    src: network.xml.j2
    dest: "{{ jellyfin_config_dir }}/network.xml"
    owner: jellyfin
    group: adm
    mode: "0644"
  notify: Restart Jellyfin

- name: Ensure Jellyfin service is enabled and started
  ansible.builtin.systemd:
    name: jellyfin
    enabled: true
    state: started

# --- GPU Watchdog ---
- name: Deploy GPU watchdog script
  ansible.builtin.template:
    src: gpu-watchdog.sh.j2
    dest: /usr/local/bin/gpu-watchdog.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart GPU watchdog

- name: Deploy GPU watchdog service
  ansible.builtin.template:
    src: gpu-watchdog.service.j2
    dest: /etc/systemd/system/gpu-watchdog.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart GPU watchdog

- name: Enable GPU watchdog service
  ansible.builtin.systemd:
    name: gpu-watchdog.service
    enabled: true
    state: started
    daemon_reload: true

# --- Monitoring ---
- name: Deploy Jellyfin monitoring API key
  ansible.builtin.copy:
    content: "{{ jellyfin_monitoring_api_key }}"
    dest: "{{ jellyfin_config_dir }}/monitoring-api-key"
    owner: root
    group: root
    mode: "0600"
  when: jellyfin_monitoring_api_key | length > 0

- name: Deploy GPU metrics collector
  ansible.builtin.template:
    src: gpu-metrics.sh.j2
    dest: /usr/local/bin/gpu-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy Jellyfin metrics collector
  ansible.builtin.template:
    src: jellyfin-metrics.sh.j2
    dest: /usr/local/bin/jellyfin-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy metrics systemd services
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | replace('.j2', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - gpu-metrics.service.j2
    - gpu-metrics.timer.j2
    - jellyfin-metrics.service.j2
    - jellyfin-metrics.timer.j2
  notify: Reload systemd

- name: Enable metrics timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - gpu-metrics.timer
    - jellyfin-metrics.timer
