---
# Jellyfin native install, CPU (software) transcoding.
#
# GPU transcoding was removed 2026-05-31: the RTX 2080 Ti repeatedly "fell off
# the bus" under VFIO passthrough (consumer GeForce + vfio power/reset
# fragility) and pcie_aspm=off did not cure it. The card was moved to a
# dedicated LLM workload. The Ryzen 9 5950X handles software transcoding for
# this household's direct-play-heavy usage (rare 1-2 concurrent 4K). See the
# decommission tasks below, which remove the obsolete GPU artifacts.

# --- Jellyfin Native Install ---
- name: Add Jellyfin GPG key
  ansible.builtin.get_url:
    url: https://repo.jellyfin.org/jellyfin_team.gpg.key
    dest: /etc/apt/keyrings/jellyfin.asc
    mode: "0644"

- name: Add Jellyfin apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/jellyfin.asc] https://repo.jellyfin.org/ubuntu {{ ansible_distribution_release }} main"
    filename: jellyfin
    state: present

- name: Install Jellyfin
  ansible.builtin.apt:
    name:
      - jellyfin
      - sqlite3
    state: present
    update_cache: true

# --- NFS Mount ---
- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ jellyfin_media_mount }}"
    state: directory
    mode: "0755"

- name: Add NFS mount to fstab
  ansible.posix.mount:
    src: "{{ jellyfin_nfs_server }}:{{ jellyfin_media_nfs_path }}"
    path: "{{ jellyfin_media_mount }}"
    fstype: nfs
    opts: "nfsvers=4.1,hard,timeo=600,retrans=2"
    state: mounted

# --- Jellyfin Configuration ---
- name: Use the stock jellyfin-ffmpeg (no GPU wrapper)
  ansible.builtin.lineinfile:
    path: /etc/default/jellyfin
    regexp: '^JELLYFIN_FFMPEG_OPT='
    line: 'JELLYFIN_FFMPEG_OPT="--ffmpeg={{ jellyfin_ffmpeg_path }}"'
  notify: Restart Jellyfin

- name: Template encoding.xml
  ansible.builtin.template:
    src: encoding.xml.j2
    dest: "{{ jellyfin_config_dir }}/encoding.xml"
    owner: jellyfin
    group: adm
    mode: "0644"
  notify: Restart Jellyfin

- name: Template network.xml
  ansible.builtin.template:
    src: network.xml.j2
    dest: "{{ jellyfin_config_dir }}/network.xml"
    owner: jellyfin
    group: adm
    mode: "0644"
  notify: Restart Jellyfin

- name: Ensure Jellyfin service is enabled and started
  ansible.builtin.systemd:
    name: jellyfin
    enabled: true
    state: started

# --- Monitoring ---
- name: Deploy Jellyfin monitoring API key
  ansible.builtin.copy:
    content: "{{ jellyfin_monitoring_api_key }}"
    dest: "{{ jellyfin_config_dir }}/monitoring-api-key"
    owner: root
    group: root
    mode: "0600"
  when: jellyfin_monitoring_api_key | length > 0

- name: Deploy Jellyfin metrics collector
  ansible.builtin.template:
    src: jellyfin-metrics.sh.j2
    dest: /usr/local/bin/jellyfin-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy Jellyfin metrics systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | replace('.j2', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - jellyfin-metrics.service.j2
    - jellyfin-metrics.timer.j2
  notify: Reload systemd

- name: Enable Jellyfin metrics timer
  ansible.builtin.systemd:
    name: jellyfin-metrics.timer
    enabled: true
    state: started
    daemon_reload: true

# --- Decommission obsolete GPU artifacts (2026-05-31 CPU transcoding move) ---
# These were deployed when Jellyfin used the RTX 2080 Ti via passthrough.
# Removing them stops the crash-looping gpu-watchdog (and its flapping
# ServiceInactive alert) and the now-pointless GPU metrics collector.
- name: Decommission GPU watchdog + metrics services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - gpu-watchdog.service
    - gpu-metrics.timer
    - gpu-metrics.service
  failed_when: false

- name: Remove obsolete GPU files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/gpu-watchdog.service
    - /usr/local/bin/gpu-watchdog.sh
    - /etc/systemd/system/gpu-metrics.service
    - /etc/systemd/system/gpu-metrics.timer
    - /usr/local/bin/gpu-metrics.sh
    - /usr/local/bin/ffmpeg-wrapper.sh
    - /etc/modprobe.d/nvidia-gsp.conf
    - "{{ node_exporter_textfile_dir }}/gpu_watchdog.prom"
    - "{{ node_exporter_textfile_dir }}/gpu.prom"
  notify: Reload systemd
