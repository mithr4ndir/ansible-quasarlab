---
# --- NVIDIA Driver ---
- name: Install NVIDIA driver
  ansible.builtin.apt:
    name: "nvidia-driver-{{ nvidia_driver_version }}-server"
    state: present
    update_cache: true

- name: Disable GSP firmware for PCI passthrough
  ansible.builtin.copy:
    content: "options nvidia NVreg_EnableGpuFirmware=0\n"
    dest: /etc/modprobe.d/nvidia-gsp.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload NVIDIA driver

# --- Docker CE ---
- name: Install prerequisites for Docker repo
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

# --- NVIDIA Container Toolkit ---
- name: Add NVIDIA Container Toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
    mode: "0644"

- name: Add NVIDIA Container Toolkit apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.asc] https://nvidia.github.io/libnvidia-container/stable/deb/amd64 /"
    filename: nvidia-container-toolkit
    state: present

- name: Install nvidia-container-toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true

# --- Docker Configuration ---
- name: Configure Docker daemon for NVIDIA runtime
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Docker

- name: Ensure Docker service is enabled and started
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

# --- Jellyfin Directories ---
- name: Create Jellyfin directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - "{{ jellyfin_config_dir }}"
    - "{{ jellyfin_cache_dir }}"
    - "{{ jellyfin_config_dir }}/config"

# --- NFS Mount ---
- name: Install NFS client utilities
  ansible.builtin.apt:
    name: nfs-common
    state: present

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ jellyfin_media_mount }}"
    state: directory
    mode: "0755"

- name: Add NFS mount to fstab
  ansible.posix.mount:
    src: "{{ jellyfin_nfs_server }}:{{ jellyfin_media_nfs_path }}"
    path: "{{ jellyfin_media_mount }}"
    fstype: nfs
    opts: "nfsvers=4.1,hard,timeo=600,retrans=2"
    state: mounted

# --- Jellyfin Configuration ---
- name: Template encoding.xml
  ansible.builtin.template:
    src: encoding.xml.j2
    dest: "{{ jellyfin_config_dir }}/config/encoding.xml"
    owner: "1000"
    group: "1000"
    mode: "0644"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ jellyfin_config_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  register: compose_file

# --- Start Jellyfin ---
- name: Deploy Jellyfin via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ jellyfin_config_dir }}"
    state: present
    pull: "{{ 'always' if compose_file.changed else 'missing' }}"
  register: jellyfin_compose

# --- GPU Watchdog ---
- name: Deploy GPU watchdog script
  ansible.builtin.template:
    src: gpu-watchdog.sh.j2
    dest: /usr/local/bin/gpu-watchdog.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart GPU watchdog

- name: Deploy GPU watchdog service
  ansible.builtin.template:
    src: gpu-watchdog.service.j2
    dest: /etc/systemd/system/gpu-watchdog.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart GPU watchdog

- name: Enable GPU watchdog service
  ansible.builtin.systemd:
    name: gpu-watchdog.service
    enabled: true
    state: started
    daemon_reload: true

# --- Monitoring ---
- name: Deploy Jellyfin monitoring API key
  ansible.builtin.copy:
    content: "{{ jellyfin_monitoring_api_key }}"
    dest: "{{ jellyfin_config_dir }}/monitoring-api-key"
    owner: root
    group: root
    mode: "0600"
  when: jellyfin_monitoring_api_key | length > 0

- name: Deploy GPU metrics collector
  ansible.builtin.template:
    src: gpu-metrics.sh.j2
    dest: /usr/local/bin/gpu-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy Jellyfin metrics collector
  ansible.builtin.template:
    src: jellyfin-metrics.sh.j2
    dest: /usr/local/bin/jellyfin-metrics.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy metrics systemd services
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | replace('.j2', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - gpu-metrics.service.j2
    - gpu-metrics.timer.j2
    - jellyfin-metrics.service.j2
    - jellyfin-metrics.timer.j2
  notify: Reload systemd

- name: Enable metrics timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - gpu-metrics.timer
    - jellyfin-metrics.timer
