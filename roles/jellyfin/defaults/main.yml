---
jellyfin_config_dir: /etc/jellyfin
jellyfin_data_dir: /var/lib/jellyfin
jellyfin_cache_dir: /var/cache/jellyfin
jellyfin_nfs_server: "192.168.1.15"
jellyfin_media_nfs_path: "/mnt/tank/media"
jellyfin_media_mount: "/mnt/media"
jellyfin_http_port: 8096
jellyfin_ffmpeg_path: /usr/lib/jellyfin-ffmpeg/ffmpeg

# Transcoding is CPU (software) only. GPU passthrough was removed 2026-05-31
# after recurring "fell off the bus" hangs on the RTX 2080 Ti under VFIO.

# Monitoring
node_exporter_textfile_dir: /var/lib/node_exporter/textfiles
jellyfin_monitoring_api_key: ""
