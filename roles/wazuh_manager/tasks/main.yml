---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - apt-transport-https
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add Wazuh GPG key
  ansible.builtin.shell:
    cmd: curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --dearmor -o /usr/share/keyrings/wazuh.gpg
    creates: /usr/share/keyrings/wazuh.gpg

- name: Add Wazuh repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main"
    filename: wazuh
    state: present

- name: Download wazuh-certs-tool
  ansible.builtin.get_url:
    url: https://packages.wazuh.com/{{ wazuh_version }}/wazuh-certs-tool.sh
    dest: /tmp/wazuh-certs-tool.sh
    mode: '0755'

- name: Create certs config
  ansible.builtin.template:
    src: certs-config.yml.j2
    dest: /tmp/config.yml
    mode: '0644'

- name: Generate Wazuh certificates
  ansible.builtin.command:
    cmd: /tmp/wazuh-certs-tool.sh --all
    chdir: /tmp
    creates: /tmp/wazuh-certificates/root-ca.pem

- name: Install Wazuh Indexer
  ansible.builtin.apt:
    name: wazuh-indexer
    state: present
    update_cache: true

- name: Create indexer certs directory
  ansible.builtin.file:
    path: /etc/wazuh-indexer/certs
    state: directory
    owner: wazuh-indexer
    group: wazuh-indexer
    mode: '0500'

- name: Copy indexer certificates
  ansible.builtin.shell:
    cmd: |
      cp /tmp/wazuh-certificates/wazuh-indexer.pem /tmp/wazuh-certificates/wazuh-indexer-key.pem /tmp/wazuh-certificates/root-ca.pem /tmp/wazuh-certificates/admin.pem /tmp/wazuh-certificates/admin-key.pem /etc/wazuh-indexer/certs/
      chown -R wazuh-indexer:wazuh-indexer /etc/wazuh-indexer/certs
      chmod 400 /etc/wazuh-indexer/certs/*
    creates: /etc/wazuh-indexer/certs/root-ca.pem

- name: Configure Wazuh Indexer
  ansible.builtin.template:
    src: indexer-opensearch.yml.j2
    dest: /etc/wazuh-indexer/opensearch.yml
    mode: '0660'
    owner: wazuh-indexer
    group: wazuh-indexer
  notify: Restart wazuh-indexer

- name: Enable and start Wazuh Indexer
  ansible.builtin.systemd:
    name: wazuh-indexer
    enabled: true
    state: started

- name: Wait for Wazuh Indexer to be ready
  ansible.builtin.wait_for:
    port: "{{ wazuh_indexer_port }}"
    delay: 10
    timeout: 120

- name: Initialize Wazuh Indexer security
  ansible.builtin.command:
    cmd: /usr/share/wazuh-indexer/bin/indexer-security-init.sh
  register: security_init
  changed_when: security_init.rc == 0
  failed_when: false

- name: Install Wazuh Manager
  ansible.builtin.apt:
    name: wazuh-manager
    state: present

- name: Configure Wazuh Manager
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    mode: '0660'
    owner: root
    group: wazuh
  notify: Restart wazuh-manager

- name: Enable and start Wazuh Manager
  ansible.builtin.systemd:
    name: wazuh-manager
    enabled: true
    state: started

- name: Install Filebeat for Wazuh
  ansible.builtin.apt:
    name: filebeat
    state: present

- name: Download Wazuh Filebeat config
  ansible.builtin.get_url:
    url: "https://packages.wazuh.com/{{ wazuh_version }}/tpl/wazuh/filebeat/filebeat.yml"
    dest: /etc/filebeat/filebeat.yml
    mode: '0644'

- name: Download Wazuh Filebeat module
  ansible.builtin.shell:
    cmd: "curl -s https://packages.wazuh.com/4.x/filebeat/wazuh-filebeat-0.4.tar.gz | tar -xvz -C /usr/share/filebeat/module"
    creates: /usr/share/filebeat/module/wazuh

- name: Create Filebeat certs directory
  ansible.builtin.file:
    path: /etc/filebeat/certs
    state: directory
    owner: root
    group: root
    mode: '0500'

- name: Copy Filebeat certificates
  ansible.builtin.shell:
    cmd: |
      cp /tmp/wazuh-certificates/wazuh-manager.pem /tmp/wazuh-certificates/wazuh-manager-key.pem /tmp/wazuh-certificates/root-ca.pem /etc/filebeat/certs/
      chmod 400 /etc/filebeat/certs/*
    creates: /etc/filebeat/certs/root-ca.pem

- name: Set Filebeat output to local indexer
  ansible.builtin.lineinfile:
    path: /etc/filebeat/filebeat.yml
    regexp: '^  hosts:'
    line: "  hosts: [\"127.0.0.1:{{ wazuh_indexer_port }}\"]"

- name: Enable and start Filebeat
  ansible.builtin.systemd:
    name: filebeat
    enabled: true
    state: started
  notify: Restart filebeat

- name: Install Wazuh Dashboard
  ansible.builtin.apt:
    name: wazuh-dashboard
    state: present

- name: Create dashboard certs directory
  ansible.builtin.file:
    path: /etc/wazuh-dashboard/certs
    state: directory
    owner: wazuh-dashboard
    group: wazuh-dashboard
    mode: '0500'

- name: Copy dashboard certificates
  ansible.builtin.shell:
    cmd: |
      cp /tmp/wazuh-certificates/wazuh-dashboard.pem /tmp/wazuh-certificates/wazuh-dashboard-key.pem /tmp/wazuh-certificates/root-ca.pem /etc/wazuh-dashboard/certs/
      chown -R wazuh-dashboard:wazuh-dashboard /etc/wazuh-dashboard/certs
      chmod 400 /etc/wazuh-dashboard/certs/*
    creates: /etc/wazuh-dashboard/certs/root-ca.pem

- name: Configure Wazuh Dashboard
  ansible.builtin.template:
    src: dashboard-opensearch-dashboards.yml.j2
    dest: /etc/wazuh-dashboard/opensearch_dashboards.yml
    mode: '0660'
    owner: wazuh-dashboard
    group: wazuh-dashboard
  notify: Restart wazuh-dashboard

- name: Enable and start Wazuh Dashboard
  ansible.builtin.systemd:
    name: wazuh-dashboard
    enabled: true
    state: started

- name: Wait for Wazuh Dashboard to be ready
  ansible.builtin.wait_for:
    port: "{{ wazuh_dashboard_port }}"
    delay: 15
    timeout: 120

- name: Change indexer admin password
  ansible.builtin.shell:
    cmd: >
      /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh
      -u admin -p '{{ wazuh_admin_password }}'
  no_log: true
  changed_when: true
  when: wazuh_admin_password is defined

- name: Change Wazuh API password
  ansible.builtin.uri:
    url: "https://127.0.0.1:{{ wazuh_api_port }}/security/users/1"
    method: PUT
    user: wazuh
    password: wazuh
    body_format: json
    body:
      password: "{{ wazuh_api_password }}"
    validate_certs: false
    force_basic_auth: true
    status_code: [200]
  no_log: true
  when: wazuh_api_password is defined
  failed_when: false
